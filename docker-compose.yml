version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: kihumba_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kihumba
      POSTGRES_PASSWORD: kihumba_dev_pass
      POSTGRES_DB: kihumba_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kihumba_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
